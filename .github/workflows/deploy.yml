name: Production Render CI-CD Deployment

on:
  push:
    branches: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image 
        run: docker build -t aliahmedmansoori01/ci_cd_actions:1 .

      - name: Push Image to DockerHub
        run: docker push aliahmedmansoori01/ci_cd_actions:1

      - name: Trigger Render deploy
        run: |
          echo "Calling Render deploy hook..."
          curl ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Finish deployment
        run: echo "Production deployment completed successfully!"
